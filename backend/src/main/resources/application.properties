# application.properties
server.port=8080

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Mail (optional - configure to enable emailing in ContactService)
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.portfolio=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info

